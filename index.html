<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Lava Jato Favorito</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f2f2f2}
header{background:#000;text-align:center;padding:10px}
header img{max-width:280px;width:80%}
.container{max-width:900px;margin:auto;padding:10px}
.card{background:#fff;padding:12px;margin-bottom:12px;border-radius:6px}
button{background:#c00000;color:#fff;border:none;padding:8px 12px;border-radius:4px;font-size:15px}
button.gray{background:#666}
input,select,textarea{width:100%;padding:6px;margin:4px 0;font-size:15px}
.tabs{display:flex;gap:4px;overflow-x:auto}
.tabs button{flex:1;background:#ccc;color:#000}
.tabs button.active{background:#c00000;color:#fff}
ul{padding-left:18px}
.small{font-size:12px;color:#555}
.hidden{display:none}
</style>
</head>

<body>

<header>
<img src="https://raw.githubusercontent.com/postohighway/lava_jato_favorito/main/lojo.png"
     alt="Favorito Lava Rápido">
</header>

<div class="container">

<div class="card tabs">
<button id="t1" class="active">Nova Comanda</button>
<button id="t2">Abertas</button>
<button id="t3">Clientes</button>
<button id="t4">Serviços</button>
<button id="t5">Caixa</button>
</div>

<!-- NOVA COMANDA -->
<div id="v1" class="card">
<h3>Abrir Comanda</h3>
<select id="clienteSelect"></select>
<input id="placa" placeholder="Placa (opcional)">
<button onclick="abrirComanda()">Abrir</button>
</div>

<!-- ABERTAS -->
<div id="v2" class="card hidden">
<h3>Comandas Abertas</h3>
<div id="listaAbertas"></div>
<div id="detalhe"></div>
</div>

<!-- CLIENTES -->
<div id="v3" class="card hidden">
<h3>Clientes</h3>
<input id="buscaCliente" placeholder="Buscar cliente...">
<input id="nomeCliente" placeholder="Nome">
<input id="whatsCliente" placeholder="WhatsApp">
<input id="descCliente" type="number" placeholder="Desconto %">
<textarea id="obsCliente" placeholder="Observações"></textarea>
<button onclick="addCliente()">Cadastrar</button>
<ul id="listaClientes"></ul>
</div>

<!-- SERVIÇOS -->
<div id="v4" class="card hidden">
<h3>Serviços</h3>
<div id="servicosEdit"></div>
<button onclick="salvarServicos()">Salvar Valores</button>
</div>

<!-- CAIXA -->
<div id="v5" class="card hidden">
<h3>Caixa Mensal</h3>
<input type="month" id="mesCaixa">
<div id="resumoCaixa"></div>
</div>

</div>

<script>
let data=JSON.parse(localStorage.getItem("favorito"))||{
clientes:[],
servicos:[
{id:1,nome:"Ducha carro pequeno",valor:30},
{id:2,nome:"Ducha carro grande",valor:50},
{id:3,nome:"Lavada completa carro pequeno",valor:50},
{id:4,nome:"Lavada completa carro grande",valor:60},
{id:5,nome:"Lavada caminhonete",valor:50},
{id:6,nome:"Lavagem de motor",valor:50},
{id:7,nome:"Martelinho (por amassado)",valor:80},
{id:8,nome:"Polimento farol",valor:40},
{id:9,nome:"Polimento pintura",valor:300},
{id:10,nome:"Higienização banco",valor:120}
],
comandas:[],
cid:1,oid:1
}

function save(){localStorage.setItem("favorito",JSON.stringify(data))}

function renderClientes(){
let s=document.getElementById("clienteSelect");s.innerHTML="<option value=''>Cliente</option>"
let ul=document.getElementById("listaClientes");ul.innerHTML=""
let q=document.getElementById("buscaCliente").value?.toLowerCase()||""
data.clientes.forEach(c=>{
if(c.nome.toLowerCase().includes(q)||c.whats.includes(q)||c.obs.toLowerCase().includes(q)){
s.innerHTML+=`<option value="${c.id}">${c.nome}</option>`
ul.innerHTML+=`<li>${c.nome} - ${c.whats} - ${c.desc||0}%</li>`
}})
}

function addCliente(){
data.clientes.push({
id:data.cid++,
nome:nomeCliente.value,
whats:whatsCliente.value,
desc:+descCliente.value||0,
obs:obsCliente.value
})
nomeCliente.value=whatsCliente.value=descCliente.value=obsCliente.value=""
save();renderClientes()
}

function abrirComanda(){
let cid=+clienteSelect.value
if(!cid)return alert("Selecione cliente")
data.comandas.push({id:data.oid++,cid,placa:placa.value,itens:[],total:0,status:"aberta",data:new Date().toISOString()})
placa.value=""
save();renderAbertas()
}

function renderAbertas(){
let d=document.getElementById("listaAbertas");d.innerHTML=""
data.comandas.filter(c=>c.status=="aberta").forEach(c=>{
let cli=data.clientes.find(x=>x.id==c.cid)
d.innerHTML+=`<p>#${c.id} - ${cli.nome} - R$ ${c.total.toFixed(2)}
<button onclick="ver(${c.id})">Abrir</button></p>`
})
}

function ver(id){
let c=data.comandas.find(x=>x.id==id)
let h=`<h4>Comanda #${c.id}</h4>`
data.servicos.forEach(s=>{
h+=`${s.nome} R$${s.valor}
<button onclick="addItem(${id},${s.id})">+</button><br>`
})
h+=`<button onclick="fechar(${id})">Fechar</button>`
detalhe.innerHTML=h
}

function addItem(oid,sid){
let c=data.comandas.find(x=>x.id==oid)
let s=data.servicos.find(x=>x.id==sid)
c.itens.push(s)
c.total+=s.valor
save();renderAbertas();ver(oid)
}

function fechar(id){
let c=data.comandas.find(x=>x.id==id)
c.status="fechada"
save();renderAbertas();detalhe.innerHTML=""
}

function salvarServicos(){
document.querySelectorAll(".sv").forEach(i=>{
let s=data.servicos.find(x=>x.id==i.dataset.id)
s.valor=+i.value
})
save()
}

function renderServicos(){
servicosEdit.innerHTML=""
data.servicos.forEach(s=>{
servicosEdit.innerHTML+=`${s.nome}<input class="sv" data-id="${s.id}" value="${s.valor}"><br>`
})
}

function troca(tab){
["v1","v2","v3","v4","v5"].forEach(v=>document.getElementById(v).classList.add("hidden"))
["t1","t2","t3","t4","t5"].forEach(t=>document.getElementById(t).classList.remove("active"))
document.getElementById("v"+tab).classList.remove("hidden")
document.getElementById("t"+tab).classList.add("active")
}

t1.onclick=()=>troca(1)
t2.onclick=()=>{troca(2);renderAbertas()}
t3.onclick=()=>{troca(3);renderClientes()}
t4.onclick=()=>{troca(4);renderServicos()}
t5.onclick=()=>troca(5)

renderClientes()
</script>

</body>
</html>
